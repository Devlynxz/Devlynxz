name: Update README stats cards

on:
  schedule:
    - cron: "0 3 * * 0" # weekly, Sunday 03:00 UTC
  push:
    branches: [main]
    paths:
      - ".github/workflows/readme-stats.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Devlynxz&show_icons=true&include_all_commits=true&theme=tokyonight&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=Devlynxz&layout=compact&theme=tokyonight&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate CodeCrew Blog pin
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=Devlynxz&repo=codecrew-blog&theme=tokyonight&hide_border=true
          path: profile/pin-codecrew-blog.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate MateSpace pin
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=Devlynxz&repo=matespaceprod-app&theme=tokyonight&hide_border=true
          path: profile/pin-matespaceprod-app.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet || git commit -m "chore: refresh README stats cards"
          git push
